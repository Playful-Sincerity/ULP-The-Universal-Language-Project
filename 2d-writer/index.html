<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Writer — Universal Language Project</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- p5.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <!-- compromise.js for NLP -->
  <script src="https://unpkg.com/compromise@14.15.0/builds/compromise.js"></script>
</head>
<body>
  <!-- p5.js canvas will be inserted here -->
  <div id="canvas-container"></div>

  <!-- Semantic breakdown display -->
  <div id="breakdown"></div>

  <!-- Bottom control bar -->
  <div id="controls">
    <!-- Demo bubbles -->
    <div id="demos"></div>
    <!-- Text input -->
    <div id="input-row">
      <input type="text" id="text-input" placeholder="Type a concept, sentence, or idea..." autocomplete="off" spellcheck="false">
      <button id="generate-btn" aria-label="Generate glyph">→</button>
    </div>
  </div>

  <!-- App scripts (order matters) -->
  <script src="js/dictionary.js"></script>
  <script src="js/conceptnet.js"></script>
  <script src="js/semantic-engine.js"></script>
  <script src="js/layout-engine.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/demos.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
